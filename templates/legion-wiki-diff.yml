name: Legion Wiki Diff

# Auto-generated by legion.installPrReviewBot — edit to suit your project.
# This workflow runs on every PR touching source files, runs an incremental
# Legion Update pass, and posts an idempotent wiki-diff comment to the PR.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'packages/**/src/**'

jobs:
  wiki-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Legion Update (PR diff)
        id: legion
        env:
          LEGION_ANTHROPIC_API_KEY: ${{ secrets.LEGION_ANTHROPIC_API_KEY }}
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(ts|tsx|js|jsx|py|go|rs)$' \
            | tr '\n' ',' > /tmp/changed_files.txt || true

          FILES=$(cat /tmp/changed_files.txt)
          if [ -z "$FILES" ]; then
            echo "LEGION_PAGES_CREATED=0" >> "$GITHUB_OUTPUT"
            echo "LEGION_PAGES_UPDATED=0" >> "$GITHUB_OUTPUT"
            echo "LEGION_CONTRADICTIONS=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node dist/cli.js --mode update --files "$FILES" 2>&1 | tee /tmp/legion-output.txt || true

          SUMMARY=$(grep 'LEGION_SUMMARY=' /tmp/legion-output.txt | tail -1 | sed 's/LEGION_SUMMARY=//' || echo '{}')

          echo "LEGION_PAGES_CREATED=$(echo $SUMMARY | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("pages_created",0))'  2>/dev/null || echo 0)" >> "$GITHUB_OUTPUT"
          echo "LEGION_PAGES_UPDATED=$(echo $SUMMARY | python3 -c  'import sys,json; d=json.load(sys.stdin); print(d.get("pages_updated",0))'  2>/dev/null || echo 0)" >> "$GITHUB_OUTPUT"
          echo "LEGION_CONTRADICTIONS=$(echo $SUMMARY | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("contradictions",0))' 2>/dev/null || echo 0)" >> "$GITHUB_OUTPUT"

      - name: Post PR comment (idempotent)
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- legion-wiki-diff -->';
            const created       = parseInt('${{ steps.legion.outputs.LEGION_PAGES_CREATED }}') || 0;
            const updated       = parseInt('${{ steps.legion.outputs.LEGION_PAGES_UPDATED }}') || 0;
            const contradictions= parseInt('${{ steps.legion.outputs.LEGION_CONTRADICTIONS }}') || 0;

            function healthBadge(c) {
              if (c > 0) return '![Docs Health](https://img.shields.io/badge/Docs-Contradictions-red)';
              return '![Docs Health](https://img.shields.io/badge/Docs-No%20Contradictions-brightgreen)';
            }

            const sha    = context.sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            const body = [
              marker,
              '## Legion Docs Update',
              '',
              healthBadge(contradictions),
              '',
              `**Commit:** [${sha}](${repoUrl}/commit/${context.sha}) | **Branch:** \`${branch}\``,
              '',
              `### Pages Created (${created})`,
              created === 0 ? '_None_' : `${created} new wiki page(s) created on this PR branch.`,
              '',
              `### Pages Updated (${updated})`,
              updated === 0 ? '_None_' : `${updated} existing wiki page(s) updated.`,
              '',
              `### Contradictions Detected (${contradictions})`,
              contradictions === 0
                ? 'None — docs are consistent.'
                : `${contradictions} contradiction(s) detected. Open Legion → Resolve Contradictions… to review.`,
              '',
              '---',
              '*Generated by [Legion](https://github.com/thenotoriousllama/legion) — wiki diff from merge base to HEAD*',
            ].join('\n');

            // Idempotent: update existing comment or create new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
