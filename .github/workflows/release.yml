name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.7.1). Must already exist on the repo."
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build VSIX & GitHub Release
    runs-on: ubuntu-latest
    outputs:
      vsix: ${{ steps.vsix.outputs.path }}
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Checkout legion-project source-of-truth
        uses: actions/checkout@v4
        with:
          repository: thenotoriousllama/legion-project
          ref: main
          path: legion-project-src

      - name: Build VSIX
        env:
          LEGION_SOURCE: ${{ github.workspace }}/legion-project-src/legion/.cursor
        run: npm run package

      - name: Locate VSIX
        id: vsix
        run: |
          VSIX_PATH=$(ls -1 *.vsix | head -n 1)
          echo "path=$VSIX_PATH" >> "$GITHUB_OUTPUT"
          echo "Built: $VSIX_PATH"

      - name: Upload VSIX as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: legion-vsix
          path: "*.vsix"
          if-no-files-found: error
          retention-days: 30

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading VSIX (clobber)"
            gh release upload "$TAG" "${{ steps.vsix.outputs.path }}" --clobber
          else
            gh release create "$TAG" "${{ steps.vsix.outputs.path }}" \
              --title "Legion $TAG" \
              --generate-notes
          fi

  vscode-marketplace:
    name: Publish to VS Code Marketplace
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.release.result == 'success' }}

    steps:
      - name: Check VSCE_PAT secret
        id: gate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "VSCE_PAT secret is not set — skipping VS Code Marketplace publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          name: legion-vsix

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          node-version: "20"

      - name: Publish to VS Code Marketplace
        if: steps.gate.outputs.enabled == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VSIX_PATH=$(ls -1 *.vsix | head -n 1)
          echo "Publishing $VSIX_PATH to VS Code Marketplace"
          npx --yes @vscode/vsce publish --packagePath "$VSIX_PATH" --pat "$VSCE_PAT" --no-dependencies

  open-vsx:
    name: Publish to Open VSX (optional)
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.release.result == 'success' }}

    steps:
      - name: Check OVSX_PAT secret
        id: gate
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "${OVSX_PAT}" ]; then
            echo "OVSX_PAT secret is not set — skipping Open VSX publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          name: legion-vsix

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          node-version: "20"

      # Self-heal: Open VSX requires the publisher namespace to exist before any
      # extension can be published under it (unlike VS Code Marketplace, which
      # auto-creates namespaces from the publisher account on first use). We
      # query the public namespace endpoint (no auth required) to check
      # existence, and only call `create-namespace` when it's actually missing.
      # This is idempotent — every release after the first one is a quick 200
      # check + skip. First release after a publisher change auto-creates.
      - name: Ensure Open VSX namespace exists
        if: steps.gate.outputs.enabled == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          PUBLISHER=$(node -p "require('./package.json').publisher")
          if [ -z "$PUBLISHER" ] || [ "$PUBLISHER" = "undefined" ]; then
            echo "::error::Could not read 'publisher' from package.json"
            exit 1
          fi
          echo "Checking Open VSX namespace '$PUBLISHER'…"
          HTTP_CODE=$(curl -sS -o /tmp/ns-resp.json -w "%{http_code}" \
            "https://open-vsx.org/api/$PUBLISHER")
          case "$HTTP_CODE" in
            200)
              echo "Namespace '$PUBLISHER' already exists — proceeding to publish"
              ;;
            404)
              echo "Namespace '$PUBLISHER' does not exist — creating now"
              npx --yes ovsx create-namespace "$PUBLISHER" -p "$OVSX_PAT"
              ;;
            *)
              echo "::error::Unexpected HTTP $HTTP_CODE from Open VSX namespace API"
              cat /tmp/ns-resp.json
              exit 1
              ;;
          esac

      - name: Publish to Open VSX
        if: steps.gate.outputs.enabled == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          VSIX_PATH=$(ls -1 *.vsix | head -n 1)
          echo "Publishing $VSIX_PATH to Open VSX"
          npx --yes ovsx publish "$VSIX_PATH" -p "$OVSX_PAT"
