name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.7.1). Must already exist on the repo."
        required: true

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build job — matrix across the platforms Cursor's SDK supports.
  #
  # Each job runs on the actual target platform so `npm ci` pulls the
  # platform-correct sqlite3 native binary and the matching @cursor/sdk-<plat>
  # optional dependency. We then `vsce package --target <plat>` to produce a
  # platform-tagged VSIX (filename: legion-<version>-<target>.vsix). The
  # Marketplace and Open VSX both serve each user the right one based on the
  # target metadata.
  #
  # NOTE: Two platforms Cursor's SDK supports are intentionally absent:
  #   • darwin-x64 — `macos-13` is the only x64 macOS runner GitHub offers,
  #     and queue times often exceed 30 min during peak hours, blocking the
  #     whole matrix. v1.1.0 ships without it; Intel Mac users should set
  #     `legion.agentInvocationMode` to `direct-anthropic-api`. A future
  #     release can re-add it via cross-compilation on `macos-latest` (arm64)
  #     with `npm install --cpu=x64 --os=darwin`.
  #   • win32-arm64 — no `@cursor/sdk-win32-arm64` on npm yet (Cursor hasn't
  #     published it). Same workaround: `direct-anthropic-api`.
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build VSIX (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            os: windows-latest
          - target: darwin-arm64
            os: macos-latest
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Verify package.json version matches tag
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Checkout legion-project source-of-truth
        uses: actions/checkout@v4
        with:
          repository: thenotoriousllama/legion-project
          ref: main
          path: legion-project-src

      - name: Snapshot bundled guardians
        shell: bash
        env:
          LEGION_SOURCE: ${{ github.workspace }}/legion-project-src/legion/.cursor
        run: npm run snapshot

      - name: Compile
        run: npm run compile:all -- --minify

      - name: Package VSIX
        shell: bash
        run: |
          npx --yes @vscode/vsce package \
            --target ${{ matrix.target }} \
            --baseContentUrl https://github.com/thenotoriousllama/legion/raw/HEAD \
            --baseImagesUrl https://github.com/thenotoriousllama/legion/raw/HEAD

      - name: Locate + size VSIX
        id: vsix
        shell: bash
        run: |
          VSIX_PATH=$(ls -1 *.vsix | head -n 1)
          SIZE_KB=$(($(wc -c < "$VSIX_PATH") / 1024))
          echo "path=$VSIX_PATH" >> "$GITHUB_OUTPUT"
          echo "Built: $VSIX_PATH (${SIZE_KB} KB)"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: legion-vsix-${{ matrix.target }}
          path: "*.vsix"
          if-no-files-found: error
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Universal build — produces a VSIX with no --target flag so the extension
  # appears in the Extensions panel search for ALL clients (including older
  # VS Code / Cursor versions and any platform we don't ship a native VSIX
  # for). This is the "fallback" listing. Platform-specific VSIXes still win
  # when the IDE requests one for a matched platform.
  #
  # The universal VSIX excludes @cursor/sdk / sqlite3 native binaries because
  # it can't know the target platform, so cursor-sdk mode won't work on it.
  # Users on unsupported platforms (Windows ARM, Intel Mac, etc.) should set
  # legion.agentInvocationMode to direct-anthropic-api. The VSIX description
  # and the sidebar Setup section both guide users to this fallback.
  # ──────────────────────────────────────────────────────────────────────────
  build-universal:
    name: Build VSIX (universal)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Verify package.json version matches tag
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Checkout legion-project source-of-truth
        uses: actions/checkout@v4
        with:
          repository: thenotoriousllama/legion-project
          ref: main
          path: legion-project-src

      - name: Snapshot bundled guardians
        shell: bash
        env:
          LEGION_SOURCE: ${{ github.workspace }}/legion-project-src/legion/.cursor
        run: npm run snapshot

      - name: Compile
        run: npm run compile:all -- --minify

      - name: Package universal VSIX (no --target)
        shell: bash
        run: |
          npx --yes @vscode/vsce package \
            --no-dependencies \
            --baseContentUrl https://github.com/thenotoriousllama/legion/raw/HEAD \
            --baseImagesUrl https://github.com/thenotoriousllama/legion/raw/HEAD

      - name: Locate + size VSIX
        id: vsix
        shell: bash
        run: |
          VSIX_PATH=$(ls -1 *.vsix | head -n 1)
          SIZE_KB=$(($(wc -c < "$VSIX_PATH") / 1024))
          echo "path=$VSIX_PATH" >> "$GITHUB_OUTPUT"
          echo "Built universal: $VSIX_PATH (${SIZE_KB} KB)"

      - name: Upload universal VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: legion-vsix-universal
          path: "*.vsix"
          if-no-files-found: error
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Release job — single, depends on build matrix. Downloads all VSIXes
  # (platform-specific + universal) and creates one GitHub Release.
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build, build-universal]
    runs-on: ubuntu-latest

    steps:
      # Without checkout, `gh release` can't auto-detect the repo from the
      # working directory and dies with "not a git repository". Pin the ref
      # to the released tag so any auto-generated release notes (`--generate-notes`)
      # compute against the right commit range.
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.tag }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: vsixes
          pattern: "legion-vsix-*"
          merge-multiple: true

      - name: Inventory artifacts
        shell: bash
        run: |
          echo "Downloaded VSIXes:"
          ls -la vsixes/
          echo ""
          echo "Total: $(ls -1 vsixes/*.vsix | wc -l) VSIX(es)"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading VSIXes (clobber)"
            gh release upload "$TAG" vsixes/*.vsix --clobber
          else
            gh release create "$TAG" vsixes/*.vsix \
              --title "Legion $TAG" \
              --generate-notes
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # Marketplace publish — uploads each platform VSIX. Marketplace serves the
  # right one to each user based on the platform target metadata in the VSIX.
  # ──────────────────────────────────────────────────────────────────────────
  vscode-marketplace:
    name: Publish to VS Code Marketplace
    needs: [build, build-universal, release]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.release.result == 'success' }}

    steps:
      - name: Check VSCE_PAT secret
        id: gate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "VSCE_PAT secret is not set — skipping VS Code Marketplace publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          path: vsixes
          merge-multiple: true

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          node-version: "20"

      - name: Publish all platform VSIXes to VS Code Marketplace
        if: steps.gate.outputs.enabled == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          PUBLISHED=0
          FAILED=0
          for VSIX in vsixes/*.vsix; do
            echo ""
            echo "─── Publishing $(basename "$VSIX") ───"
            if npx --yes @vscode/vsce publish --packagePath "$VSIX" --pat "$VSCE_PAT" --no-dependencies; then
              PUBLISHED=$((PUBLISHED + 1))
            else
              FAILED=$((FAILED + 1))
              echo "::warning::Failed to publish $(basename "$VSIX")"
            fi
          done
          echo ""
          echo "Marketplace publish summary: $PUBLISHED succeeded, $FAILED failed"
          [ "$FAILED" -eq 0 ]

  # ──────────────────────────────────────────────────────────────────────────
  # Open VSX publish — same pattern as Marketplace plus the namespace
  # self-heal step from v1.0.5.
  # ──────────────────────────────────────────────────────────────────────────
  open-vsx:
    name: Publish to Open VSX (optional)
    needs: [build, build-universal, release]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.release.result == 'success' }}

    steps:
      - name: Check OVSX_PAT secret
        id: gate
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          if [ -z "${OVSX_PAT}" ]; then
            echo "OVSX_PAT secret is not set — skipping Open VSX publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          ref: ${{ needs.build.outputs.tag }}

      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          path: vsixes
          merge-multiple: true

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          node-version: "20"

      - name: Ensure Open VSX namespace exists
        if: steps.gate.outputs.enabled == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          PUBLISHER=$(node -p "require('./package.json').publisher")
          if [ -z "$PUBLISHER" ] || [ "$PUBLISHER" = "undefined" ]; then
            echo "::error::Could not read 'publisher' from package.json"
            exit 1
          fi
          echo "Checking Open VSX namespace '$PUBLISHER'…"
          HTTP_CODE=$(curl -sS -o /tmp/ns-resp.json -w "%{http_code}" \
            "https://open-vsx.org/api/$PUBLISHER")
          case "$HTTP_CODE" in
            200)
              echo "Namespace '$PUBLISHER' already exists — proceeding to publish"
              ;;
            404)
              echo "Namespace '$PUBLISHER' does not exist — creating now"
              npx --yes ovsx create-namespace "$PUBLISHER" -p "$OVSX_PAT"
              ;;
            *)
              echo "::error::Unexpected HTTP $HTTP_CODE from Open VSX namespace API"
              cat /tmp/ns-resp.json
              exit 1
              ;;
          esac

      - name: Publish all platform VSIXes to Open VSX
        if: steps.gate.outputs.enabled == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          PUBLISHED=0
          FAILED=0
          for VSIX in vsixes/*.vsix; do
            echo ""
            echo "─── Publishing $(basename "$VSIX") ───"
            if npx --yes ovsx publish "$VSIX" -p "$OVSX_PAT"; then
              PUBLISHED=$((PUBLISHED + 1))
            else
              FAILED=$((FAILED + 1))
              echo "::warning::Failed to publish $(basename "$VSIX") to Open VSX"
            fi
          done
          echo ""
          echo "Open VSX publish summary: $PUBLISHED succeeded, $FAILED failed"
          [ "$FAILED" -eq 0 ]
